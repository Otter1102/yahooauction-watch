name: ヤフオクwatch バックアップチェック

on:
  # 通知は毎時00分の主workflowだけで送る。連続通知防止のため、バックアップは手動実行専用。
  workflow_dispatch:

concurrency:
  group: yahoo-auction-watch-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5.0.1

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Supabase 起動確認
        run: |
          echo "Supabase への接続確認中..."
          for i in 1 2 3 4 5 6 7 8; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.SUPABASE_URL }}/rest/v1/conditions?select=id&limit=1" \
              -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
              --max-time 20) || STATUS=000
            echo "試行 $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "206" ]; then
              echo "SUPABASE_READY=true" >> "$GITHUB_ENV"
              exit 0
            fi
            sleep 15
          done
          echo "SUPABASE_READY=false" >> "$GITHUB_ENV"
          echo "Supabase が応答しませんでした。巡回停止を隠さないため、このrunは失敗扱いにします"
          exit 1

      - name: Run auction check (backup)
        if: ${{ env.SUPABASE_READY == 'true' }}
        run: npx tsx scripts/run-check.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          NOTIFIED_ITEMS_STORE: 'auto'
          HISTORY_STORE: 'auto'
          SEND_NO_ITEMS_PUSH: 'true'
          GH_FETCH_PAGES: '20'
          CHECK_SHARD_TOTAL: '6'
          CHECK_SHARD_INDEX: ${{ matrix.shard }}
          CHECK_FETCH_CONCURRENCY: '2'
          CHECK_SHARD_STAGGER_MS: '15000'
          CHECK_SNAPSHOT_UPDATE_LIMIT: '200'
          CHECK_NEW_ITEMS_PER_CONDITION_LIMIT: '300'
          CHECK_NEW_ITEMS_PER_USER_LIMIT: '500'
          NOTIFIED_RETENTION_HOURS: '60'
          CHECK_HISTORY_RETENTION_HOURS: '36'
          UNKNOWN_END_HISTORY_RETENTION_HOURS: '72'
          ENABLE_STALLED_NOTIFIED_RESET: 'false'
          YAHOO_PAGE_BATCH_SIZE: '1'
          YAHOO_PAGE_DELAY_MS: '250'
          SUPABASE_FETCH_TIMEOUT_MS: '90000'
          HISTORY_UPSERT_BATCH_SIZE: '100'
          NOTIFIED_UPSERT_BATCH_SIZE: '200'
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_NOTIFY_TO: ${{ secrets.GMAIL_NOTIFY_TO }}
