name: ヤフオクwatch バックアップチェック

on:
  # 通常巡回は cron.yml に一本化。DB負荷を避けるためバックアップは手動実行専用。
  workflow_dispatch:

concurrency:
  group: yahoo-auction-watch-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5.0.1

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Supabase 起動確認
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.SUPABASE_URL }}/rest/v1/conditions?select=id&limit=1" \
              -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
              --max-time 10)
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "206" ]; then
              exit 0
            fi
            sleep 10
          done

      - name: Run auction check (backup)
        run: npx tsx scripts/run-check.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          SEND_NO_ITEMS_PUSH: 'true'
          GH_FETCH_PAGES: '40'
          CHECK_SHARD_TOTAL: '6'
          CHECK_SHARD_INDEX: ${{ matrix.shard }}
          CHECK_FETCH_CONCURRENCY: '3'
          SUPABASE_FETCH_TIMEOUT_MS: '90000'
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_NOTIFY_TO: ${{ secrets.GMAIL_NOTIFY_TO }}
