name: ヤフオクwatch バックアップチェック

on:
  schedule:
    # 主チェックがGitHub schedule側で未発火になるケースの保険。
    # run-check側の50分抑制で、主チェックと重なってもチェック完了通知は最大1時間1回にする。
    - cron: '12,27,42,57 22,23 * * *'
    - cron: '12,27,42,57 0-15 * * *'
  workflow_dispatch:

concurrency:
  group: yahoo-auction-watch-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5.0.1

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Supabase 起動確認
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.SUPABASE_URL }}/rest/v1/conditions?select=id&limit=1" \
              -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
              --max-time 10) || STATUS=000
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "206" ]; then
              echo "SUPABASE_READY=true" >> "$GITHUB_ENV"
              exit 0
            fi
            sleep 10
          done
          echo "SUPABASE_READY=false" >> "$GITHUB_ENV"

      - name: Run auction check (backup)
        if: ${{ env.SUPABASE_READY == 'true' }}
        run: npx tsx scripts/run-check.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          SEND_NO_ITEMS_PUSH: 'true'
          GH_FETCH_PAGES: '40'
          CHECK_SHARD_TOTAL: '6'
          CHECK_SHARD_INDEX: ${{ matrix.shard }}
          CHECK_FETCH_CONCURRENCY: '2'
          CHECK_SHARD_STAGGER_MS: '15000'
          CHECK_SNAPSHOT_UPDATE_LIMIT: '200'
          CHECK_NEW_ITEMS_PER_CONDITION_LIMIT: '300'
          CHECK_NEW_ITEMS_PER_USER_LIMIT: '1000'
          YAHOO_PAGE_BATCH_SIZE: '1'
          YAHOO_PAGE_DELAY_MS: '250'
          SUPABASE_FETCH_TIMEOUT_MS: '90000'
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_NOTIFY_TO: ${{ secrets.GMAIL_NOTIFY_TO }}
