name: ヤフオクwatch 自動チェック

on:
  schedule:
    # GitHub Actions schedule は遅延/ドロップがあるため、バックアップworkflowも別分に置く。
    # scripts/run-check.ts 側でチェック完了通知はユーザーごとに50分1回へ抑制する。
    - cron: '7 * * * *'
  workflow_dispatch:           # 手動実行ボタン
    inputs:
      force_check_complete:
        description: 'チェック完了通知の50分抑制を解除して送る'
        required: false
        default: 'false'

concurrency:
  group: yahoo-auction-watch-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Supabase 起動確認（フリープランの一時停止対応）
        run: |
          echo "Supabase への接続確認中..."
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.SUPABASE_URL }}/rest/v1/" \
              -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
              --max-time 10)
            echo "試行 $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "400" ] || [ "$STATUS" = "401" ]; then
              echo "Supabase 起動確認完了"
              sleep 2
              exit 0
            fi
            echo "Supabase 起動待機中... 10秒後に再試行"
            sleep 10
          done
          echo "Supabase が応答しませんでした。処理を継続します"

      - name: Run auction check
        run: npx tsx scripts/run-check.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          SEND_NO_ITEMS_PUSH: 'true'
          FORCE_CHECK_COMPLETE_PUSH: ${{ github.event.inputs.force_check_complete || 'false' }}
          GH_FETCH_PAGES: '40'
          SUPABASE_FETCH_TIMEOUT_MS: '60000'
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_NOTIFY_TO: ${{ secrets.GMAIL_NOTIFY_TO }}
