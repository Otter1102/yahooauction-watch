name: ヤフオクwatch 自動チェック

on:
  schedule:
    - cron: '*/30 * * * *'   # 30分ごと
  workflow_dispatch:           # 手動実行ボタン

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Debug Supabase connection
        run: |
          echo "Key length: ${#SUPABASE_SERVICE_KEY}"
          echo "Key prefix: ${SUPABASE_SERVICE_KEY:0:10}..."
          curl -s -o /tmp/supa_debug.json -w "HTTP: %{http_code}\n" \
            "${NEXT_PUBLIC_SUPABASE_URL}/rest/v1/conditions?select=id&limit=1" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}"
          cat /tmp/supa_debug.json
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Run auction check
        run: npx tsx scripts/run-check.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
