<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#27B5D4"/>
      <stop offset="50%" stop-color="#1D9BD7"/>
      <stop offset="100%" stop-color="#1A6AC9"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Top-left shine -->
  <ellipse cx="160" cy="120" rx="210" ry="130" fill="url(#shine)" opacity="0.7"/>

  <!-- Magnifying glass circle -->
  <circle cx="210" cy="205" r="92" fill="none" stroke="white" stroke-width="38" opacity="1"/>
  <!-- Inner highlight ring -->
  <circle cx="210" cy="205" r="92" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="16"/>
  <!-- Handle -->
  <line x1="280" y1="275" x2="368" y2="368" stroke="white" stroke-width="40" stroke-linecap="round"/>

  <!-- Notification dot (top-right) -->
  <circle cx="358" cy="150" r="44" fill="#FF3B5C"/>
  <rect x="344" y="128" width="9" height="30" rx="4.5" fill="white"/>
  <circle cx="348.5" cy="165" r="4.5" fill="white"/>
</svg>
